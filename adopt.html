<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Adopt a Pet</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

<section class="contact">
    <h1>🐾 Pet Adoption Form</h1>

    <form>
        <input type="text" placeholder="Full Name" required><br><br>

        <input type="email" placeholder="Email Address" required><br><br>

        <input type="tel" placeholder="Phone Number" required><br><br>

        <input type="text" placeholder="Pet Name You Want to Adopt" required><br><br>

        <textarea placeholder="Why do you want to adopt this pet?" rows="5"></textarea><br><br>

        <button type="submit">Submit Application</button>
    </form>

</section>

</body>
</html>
